name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (emergency only)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        if: ${{ !inputs.skip_tests }}
        run: npm test

  deploy:
    name: Deploy to Firebase (Dev)
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate evidence bundle
        run: npm run proof:generate
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.APP_URL }}

      - name: Verify evidence bundle
        run: npm run proof:verify

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.APP_URL }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ vars.FIREBASE_PROJECT }}
