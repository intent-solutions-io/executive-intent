name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch secrets from Google Secret Manager
        id: secrets
        run: |
          echo "SUPABASE_URL=$(gcloud secrets versions access latest --secret=SUPABASE_URL --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "SUPABASE_SERVICE_ROLE_KEY=$(gcloud secrets versions access latest --secret=SUPABASE_SERVICE_ROLE_KEY --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "INNGEST_EVENT_KEY=$(gcloud secrets versions access latest --secret=INNGEST_EVENT_KEY --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "INNGEST_SIGNING_KEY=$(gcloud secrets versions access latest --secret=INNGEST_SIGNING_KEY --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "NIGHTFALL_API_KEY=$(gcloud secrets versions access latest --secret=NIGHTFALL_API_KEY --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "GOOGLE_CLIENT_ID=$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_ID --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT
          echo "GOOGLE_CLIENT_SECRET=$(gcloud secrets versions access latest --secret=GOOGLE_CLIENT_SECRET --project=${{ env.PROJECT_ID }})" >> $GITHUB_OUTPUT

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.secrets.outputs.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Generate evidence bundle
        run: pnpm proof:generate
        env:
          SUPABASE_URL: ${{ steps.secrets.outputs.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.secrets.outputs.SUPABASE_SERVICE_ROLE_KEY }}
          INNGEST_EVENT_KEY: ${{ steps.secrets.outputs.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ steps.secrets.outputs.INNGEST_SIGNING_KEY }}
          NIGHTFALL_API_KEY: ${{ steps.secrets.outputs.NIGHTFALL_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ steps.secrets.outputs.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ steps.secrets.outputs.GOOGLE_CLIENT_SECRET }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify evidence bundle
        run: pnpm proof:verify

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          firebase experiments:enable webframeworks
          firebase deploy --only hosting --project ${{ env.PROJECT_ID }} --force

      - name: Post-deploy health check
        if: github.event.inputs.environment == 'production' || github.ref == 'refs/heads/main'
        run: |
          echo "Checking deployment health..."
          sleep 30
          curl -sf https://executive-intent.web.app/ > /dev/null && echo "Site is live!" || echo "Site may still be deploying..."
